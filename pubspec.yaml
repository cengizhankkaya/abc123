name: abc123
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 2.0.3+18

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"


dependencies:
  app_tracking_transparency: ^2.0.6
  audioplayers: ^6.5.0
  chopper: ^8.5.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  firebase_remote_config: ^5.4.0
  package_info_plus: ^8.3.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.0
  fpdart: ^1.2.0
  freezed_annotation: ^2.4.4
  get_it: ^8.0.3
  go_router: ^17.2.0
  google_fonts: ^6.2.1
  google_mobile_ads: ^6.0.0
  http: ^1.6.0
  image: ^4.5.4
  injectable: ^2.5.0
  intl: ^0.20.2
  meta: ^1.15.0
  path_provider: ^2.0.15
  provider: ^6.1.5
  scribble: ^0.10.0+1
  shared_preferences: ^2.5.3
  signature: ^6.3.0
  synchronized: ^3.4.0
  tflite_flutter: ^0.12.1
  url_launcher: ^6.3.2
  in_app_review: ^2.0.12
  model_viewer_plus: ^1.7.2

# google_mobile_ads → webview; Xcode yeni Swift sürümlerinde 3.22.0 Swift hatası veriyor (#9810 düzeltmesi).
dependency_overrides:
  webview_flutter_wkwebview: ^3.24.3

dev_dependencies:
  build_runner: ^2.4.13
  chopper_generator: ^8.6.1
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.6.2
  mocktail: ^1.0.4
  nested: ^1.0.0
  very_good_analysis: ^10.2.0


flutter:
  config:
    # google_mobile_ads henüz SPM desteklemiyor; webview_flutter_wkwebview SPM ile çakışıyor.
    enable-swift-package-manager: false
  generate: true
  uses-material-design: true
  assets:
    - assets/images/shapes/
    - assets/images/
    - assets/images/figures/
    - assets/images/letters/
    - assets/models/
    - assets/models/ar/
    - assets/models/final_combined_model-2.tflite
    - assets/models/rakam_model.tflite
    - assets/models/harf_emnist_letters_model.tflite
    - assets/images/puzzle/
    - assets/music/
    - assets/fonts/
    - assets/attributeicons/

  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-Light.ttf
  #         weight: 300
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/fonts/applog.png"
  remove_alpha_ios: true
