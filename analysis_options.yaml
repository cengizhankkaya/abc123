# `12_code_quality.md`: very_good_analysis + proje ayarları.
include: package:very_good_analysis/analysis_options.yaml

formatter:
  page_width: 100

analyzer:
  exclude:
    - lib/**/*.g.dart
    - lib/**/*.freezed.dart
    - lib/core/di/injection.config.dart

linter:
  rules:
    # 12_code_quality.md tarafından zorunlu kılınan kurallar:
    always_use_package_imports: true
    prefer_relative_imports: false
    # Uygulama genelinde dartdoc zorunluluğu şimdilik kapalı (kademeli geçiş).
    public_member_api_docs: false
    # Mevcut kod tabanında satır kırılımı aşamalı düzeltilecek.
    lines_longer_than_80_chars: false
    # Clean Architecture için UseCase/Repository interfaceleri tek metoda sahiptir
    one_member_abstracts: false
    # ignore: yorumları için dokümantasyon zorunluluğu kapalı
    document_ignores: false
